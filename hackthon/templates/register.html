{% extends "layout.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; margin-top: 5rem;" class="glass-panel">
    <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Enlist for the Mission</h2>
    <form method="POST">
        <div class="form-group">
            <label>Email ID</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role" class="form-control" required style="background: rgba(0,0,0,0.8);">
                <option value="candidate">Candidate (Astronaut)</option>
                <option value="hr">HR (Mission Commander)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Launch</button>
    </form>
</div>
{% endblock %}
